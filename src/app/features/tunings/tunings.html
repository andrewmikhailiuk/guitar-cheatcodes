<div class="p-4">
  <div class="mb-4">
    <label class="block text-xs text-gray-400 mb-1">{{ 'tunings.tuning' | transloco }}</label>
    <select
      class="bg-bg-fretboard text-text-primary border border-fret-line rounded px-3 py-2 text-sm"
      (change)="onTuningChange($event)"
    >
      @for (tuning of tunings; track tuning.id) {
        <option [value]="tuning.id" [selected]="tuning.id === selectedTuningId()">
          {{ tuning.labelKey | transloco }} ({{ tuning.openStrings.join(' ') }})
        </option>
      }
    </select>
  </div>

  <app-fretboard
    [fretboard]="fretboard()"
    [stringLabels]="stringLabels()"
    (noteClicked)="onNoteClick($event)"
  />

  <div class="mt-4 p-4 bg-bg-fretboard rounded-lg border border-fret-line">
    <span class="text-xs text-gray-500 uppercase tracking-wider">{{ 'cheat.noteNames' | transloco }}</span>
    <div class="flex flex-wrap gap-1.5 mt-2">
      <span class="px-2 py-0.5 rounded bg-fret-line/30 border border-fret-line/50 font-mono text-sm">C <span class="text-xs text-gray-500">До</span></span>
      <span class="px-2 py-0.5 rounded bg-fret-line/30 border border-fret-line/50 font-mono text-sm">C# <span class="text-xs text-gray-500">До#</span></span>
      <span class="px-2 py-0.5 rounded bg-fret-line/30 border border-fret-line/50 font-mono text-sm">D <span class="text-xs text-gray-500">Ре</span></span>
      <span class="px-2 py-0.5 rounded bg-fret-line/30 border border-fret-line/50 font-mono text-sm">D# <span class="text-xs text-gray-500">Ре#</span></span>
      <span class="px-2 py-0.5 rounded bg-fret-line/30 border border-fret-line/50 font-mono text-sm">E <span class="text-xs text-gray-500">Ми</span></span>
      <span class="px-2 py-0.5 rounded bg-fret-line/30 border border-fret-line/50 font-mono text-sm">F <span class="text-xs text-gray-500">Фа</span></span>
      <span class="px-2 py-0.5 rounded bg-fret-line/30 border border-fret-line/50 font-mono text-sm">F# <span class="text-xs text-gray-500">Фа#</span></span>
      <span class="px-2 py-0.5 rounded bg-fret-line/30 border border-fret-line/50 font-mono text-sm">G <span class="text-xs text-gray-500">Соль</span></span>
      <span class="px-2 py-0.5 rounded bg-fret-line/30 border border-fret-line/50 font-mono text-sm">G# <span class="text-xs text-gray-500">Соль#</span></span>
      <span class="px-2 py-0.5 rounded bg-fret-line/30 border border-fret-line/50 font-mono text-sm">A <span class="text-xs text-gray-500">Ля</span></span>
      <span class="px-2 py-0.5 rounded bg-fret-line/30 border border-fret-line/50 font-mono text-sm">A# <span class="text-xs text-gray-500">Ля#</span></span>
      <span class="px-2 py-0.5 rounded bg-fret-line/30 border border-fret-line/50 font-mono text-sm">B <span class="text-xs text-gray-500">Си</span></span>
    </div>
  </div>
</div>
