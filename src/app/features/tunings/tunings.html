<div class="p-4">
  <div class="mb-4">
    <label class="block text-xs text-gray-400 mb-1">{{ 'tunings.tuning' | transloco }}</label>
    <select
      class="bg-bg-fretboard text-text-primary border border-fret-line rounded px-3 py-2 text-sm"
      (change)="onTuningChange($event)"
    >
      @for (tuning of tunings; track tuning.id) {
        <option [value]="tuning.id" [selected]="tuning.id === selectedTuningId()">
          {{ tuning.labelKey | transloco }} ({{ tuning.openStrings.join(' ') }})
        </option>
      }
    </select>
  </div>

  <app-fretboard
    [fretboard]="fretboard()"
    [stringLabels]="stringLabels()"
    (noteClicked)="onNoteClick($event)"
  />

  <div class="mt-3 space-y-3 px-4">
    <div class="flex flex-wrap items-center gap-1.5">
      <span class="text-xs text-gray-400 mr-1">{{ 'cheat.noteNames' | transloco }}:</span>
      <span class="px-2 py-0.5 rounded bg-fret-line/30 border border-fret-line/50 font-mono text-sm">C <span class="text-xs text-gray-400">{{ 'solfege.C' | transloco }}</span></span>
      <span class="px-2 py-0.5 rounded bg-fret-line/30 border border-fret-line/50 font-mono text-sm">D <span class="text-xs text-gray-400">{{ 'solfege.D' | transloco }}</span></span>
      <span class="px-2 py-0.5 rounded bg-fret-line/30 border border-fret-line/50 font-mono text-sm">E <span class="text-xs text-gray-400">{{ 'solfege.E' | transloco }}</span></span>
      <span class="px-2 py-0.5 rounded bg-fret-line/30 border border-fret-line/50 font-mono text-sm">F <span class="text-xs text-gray-400">{{ 'solfege.F' | transloco }}</span></span>
      <span class="px-2 py-0.5 rounded bg-fret-line/30 border border-fret-line/50 font-mono text-sm">G <span class="text-xs text-gray-400">{{ 'solfege.G' | transloco }}</span></span>
      <span class="px-2 py-0.5 rounded bg-fret-line/30 border border-fret-line/50 font-mono text-sm">A <span class="text-xs text-gray-400">{{ 'solfege.A' | transloco }}</span></span>
      <span class="px-2 py-0.5 rounded bg-fret-line/30 border border-fret-line/50 font-mono text-sm">B <span class="text-xs text-gray-400">{{ 'solfege.B' | transloco }}</span></span>
    </div>
    <blockquote class="text-xs text-gray-400 leading-relaxed border-l-2 border-fret-line pl-3 italic">
      {{ 'cheat.whyC' | transloco }}
    </blockquote>
  </div>
</div>
