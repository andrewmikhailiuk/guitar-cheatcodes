<div class="p-4">
  <div class="mb-4">
    <label class="block text-xs text-gray-400 mb-1">{{ 'tunings.tuning' | transloco }}</label>
    <select
      class="bg-bg-fretboard text-text-primary border border-fret-line rounded px-3 py-2 text-sm"
      (change)="onTuningChange($event)"
    >
      @for (tuning of tunings; track tuning.id) {
        <option [value]="tuning.id" [selected]="tuning.id === selectedTuningId()">
          {{ tuning.labelKey | transloco }} ({{ tuning.openStrings.join(' ') }})
        </option>
      }
    </select>
  </div>

  <app-fretboard
    [fretboard]="fretboard()"
    [stringLabels]="stringLabels()"
    (noteClicked)="onNoteClick($event)"
  />

  <div class="mt-3 space-y-2 px-4">
    <div class="flex flex-wrap items-center gap-x-3 gap-y-1 text-xs">
      <span class="text-gray-400">{{ 'cheat.noteNames' | transloco }}:</span>
      <span class="font-mono text-sm text-text-primary">
        C<span class="text-gray-400 text-xs ml-0.5">До</span>
        <span class="text-fret-line mx-1">·</span>
        D<span class="text-gray-400 text-xs ml-0.5">Ре</span>
        <span class="text-fret-line mx-1">·</span>
        E<span class="text-gray-400 text-xs ml-0.5">Ми</span>
        <span class="text-fret-line mx-1">·</span>
        F<span class="text-gray-400 text-xs ml-0.5">Фа</span>
        <span class="text-fret-line mx-1">·</span>
        G<span class="text-gray-400 text-xs ml-0.5">Соль</span>
        <span class="text-fret-line mx-1">·</span>
        A<span class="text-gray-400 text-xs ml-0.5">Ля</span>
        <span class="text-fret-line mx-1">·</span>
        B<span class="text-gray-400 text-xs ml-0.5">Си</span>
      </span>
    </div>
    <p class="text-xs text-gray-400 leading-relaxed">
      {{ 'cheat.whyC' | transloco }}
    </p>
  </div>
</div>
